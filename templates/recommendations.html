{% extends "base.html" %}

{% block title %}Recommendations - TravelAI{% endblock %}

{% block content %}
<section class="container mt-40 mb-40">
    <form action="/recommend" method="POST" class="recommendation-form">
        <h2>✨ Get Your Travel Recommendations</h2>
        
        <div class="form-group">
            <label for="budget">💰 Your Budget (in ₹)</label>
            <input type="number" id="budget" name="budget" placeholder="e.g., 15000" min="1000" required>
            <small style="color: #666; display: block; margin-top: 5px;">Enter your total budget for the trip</small>
        </div>

        <div class="form-group">
            <label for="interest">🎯 What interests you?</label>
            <select id="interest" name="interest" required>
                <option value="">Select a type...</option>
                <option value="beach">🏖️ Beach - Relax and enjoy coastal views</option>
                <option value="mountain">⛰️ Mountain - Adventure and hiking</option>
                <option value="culture">🏛️ Culture - Historical and cultural sites</option>
            </select>
            <small style="color: #666; display: block; margin-top: 5px;">Choose what type of destination you prefer</small>
        </div>

        <button type="submit" class="btn btn-primary">Find Destinations 🔍</button>
    </form>
</section>

<style>
    .recommendation-form {
        max-width: 500px;
        background: white;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        margin: 0 auto;
    }

    .recommendation-form h2 {
        text-align: center;
        color: #667eea;
        margin-bottom: 30px;
        font-size: 1.8rem;
    }

    .recommendation-form button {
        width: 100%;
    }

    small {
        font-size: 0.85rem;
    }
</style>
{% endblock %}
