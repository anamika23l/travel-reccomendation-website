{% extends "base.html" %}

{% block title %}My Profile - TravelAI{% endblock %}

{% block content %}
<style>
    .profile-header {
        background: linear-gradient(135deg, #3acdbe 0%, #1a998c 100%);
        color: white;
        padding: 60px 2rem;
        text-align: center;
    }
    
    .profile-header h1 {
        margin: 0;
        font-size: 2.5rem;
    }
    
    .profile-container {
        max-width: 600px;
        margin: 40px auto;
        padding: 0 2rem;
    }
    
    .profile-card {
        background: white;
        border-radius: 15px;
        padding: 30px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    
    .profile-card h2 {
        color: #1a998c;
        margin-bottom: 20px;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #333;
    }
    
    .form-group input {
        width: 100%;
        padding: 12px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 1rem;
    }
    
    .form-group input:focus {
        outline: none;
        border-color: #1a998c;
    }
    
    .btn-save {
        background: #1a998c;
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 600;
        transition: all 0.3s;
    }
    
    .btn-save:hover {
        background: #147a70;
        transform: translateY(-2px);
    }
    
    .user-info {
        background: #f5f5f5;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
    }
    
    .user-info p {
        margin: 5px 0;
        color: #666;
    }
    
    .user-info strong {
        color: #1a998c;
    }
</style>

<div class="profile-header">
    <h1>👤 My Profile</h1>
    <p>Manage your account settings</p>
</div>

<div class="profile-container">
    <div class="profile-card">
        <h2>Account Information</h2>
        
        <div class="user-info">
            <p><strong>Username:</strong> {{ user_data.username }}</p>
            <p><strong>Member Since:</strong> {{ user_data.created_at }}</p>
        </div>
        
        <form method="POST">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" value="{{ user_data.email }}" required>
            </div>
            
            <div class="form-group">
                <label for="password">New Password (leave blank to keep current)</label>
                <input type="password" id="password" name="password" placeholder="Enter new password">
            </div>
            
            <button type="submit" class="btn-save">Save Changes</button>
        </form>
    </div>
</div>
{% endblock %}
