{% extends "base.html" %}

{% block title %}Register - TravelAI{% endblock %}

{% block content %}
<section class="container mt-40 mb-40">
    <form method="POST" class="login-form">
        <h2>Create Account! ✈️</h2>
        
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Choose a username" required>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="Enter your email address" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Create a password" required>
        </div>

        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm your password" required>
        </div>

        <button type="submit" class="btn btn-primary">Register</button>
    </form>
    
    <div style="text-align: center; margin-top: 20px; color: white;">
        <p>Already have an account? <a href="/login" style="color: #667eea; text-decoration: none; font-weight: bold;">Login here</a></p>
    </div>
</section>

<style>
    .login-form {
        max-width: 400px;
        background: white;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        margin: 0 auto;
    }

    .login-form h2 {
        text-align: center;
        color: #1a998c;
        margin-bottom: 30px;
    }

    .login-form button {
        width: 100%;
    }
</style>
{% endblock %}
